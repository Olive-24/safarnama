<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Safarnama</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="nav">
    <scan id="user-name"></scan>
    <button onclick="showMyTrips()">My Trips</button>
    <button id="login-btn" onclick="loginWithGoogle()">Login With Google</button>
    <button id="logout-btn" style="display:none" onclick="logout()">Logout</button>
  </div>
  <h1>Safarnama</h1>
  <p>Pack your bags, we'll plan the rest!</p>
</header>
<section class="cities">
  <div class="card">
    <h2>Delhi</h2>
    <p>History,food aur culture ka sheher!</p>
    <button onclick="selectCity('Delhi')">Plan my trip...</button>
  </div>

  <div class="card">
    <h2>Goa</h2>
    <p>Beaches,sensts aur chill vibes!</p>
    <button onclick="selectCity('Goa')">Plan my trip...</button>
  </div>

  <div class="card">
    <h2>Manali</h2>
    <p>Mountains,snow aur adventure!</p>
    <button onclick="selectCity('Manali')">Plan my trip...</button>
  </div>
</section>
<section class="form-section">
  <h2>Plan Your Trip</h2>
  <form>
    <label>How many days?</label>
    <input type="number" placeholder="e.g. 3">
    <label>Budget?</label>
    <select>
      <option>low</option>
      <option>medium</option>
      <option>high</option>
    </select>
    <label>Travel Style?</label>
    <select>
      <option>Sightseeing</option>
      <option>Food & Nightlife</option>
      <option>Adventure & Sports</option>
      <option>Relaxation</option>
    </select>
    <button type="submit">Generate My Itinerary</button>
  </form>
</section>
<div class="result">

</div>
<div class="my-trips" id="my-trips" style="display: none;">
  <h2>My Trips</h2>
  <div id="trips-list"></div>
</div>
<button id="save-btn" style="display:none">Save My Trip</button>
<input id="share-link" style="display:none; margin: 10px auto; width: 60%; padding: 10px; border-radius: 10px; border: 2px solid #6D28D9; text-align: center; font-size: 14px; color: #6D28D9;" readonly>
<script type="module" src="firebase.js"></script>
<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
