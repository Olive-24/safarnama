<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Safarnama</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Safarnama</h1>
  <p>Pack your bags, we'll plan the rest!</p>
</header>
<section class="cities">
  <div class="card">
    <h2>Delhi</h2>
    <p>History,food aur culture ka sheher!</p>
    <button>Plan my trip...</button>
  </div>

  <div class="card">
    <h2>Goa</h2>
    <p>Beaches,sensts aur chill vibes!</p>
    <button>Plan my trip...</button>
  </div>

  <div class="card">
    <h2>Manali</h2>
    <p>Mountains,snow aur adventure!</p>
    <button>Plan my trip...</button>
  </div>
</section>
<section class="form-section">
  <h2>Plan Your Trip</h2>
  <form>
    <label>How many days?</label>
    <input type="number" placeholder="e.g. 3">
    <label>Budget?</label>
    <select>
      <option>low</option>
      <option>medium</option>
      <option>high</option>
    </select>
    <label>Travel Style?</label>
    <select>
      <option>Sightseeing</option>
      <option>Food & Nightlife</option>
      <option>Adventure & Sports</option>
      <option>Relaxation</option>
    </select>
    <button type="submit">Generate My Itinerary</button>
  </form>
</section>
</body>
</html>
